<div class="form-container">
  <h2>Add Staff Member</h2>

  <form [formGroup]="staffForm" (ngSubmit)="onSave()">
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input id="firstName" type="text" formControlName="firstName" placeholder="Enter first name" />
    </div>

    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input id="lastName" type="text" formControlName="lastName" placeholder="Enter last name" />
    </div>

    <div class="form-group">
      <label for="gender">Gender</label>
      <select id="gender" formControlName="gender">
        <option value="">-- Select --</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
        <option value="Prefer not to say">Prefer not to say</option>
      </select>
    </div>

    <div class="form-group">
      <label for="credentials">Credentials</label>
      <input id="credentials" type="text" formControlName="credentials" placeholder="e.g. MD, RN, PhD" />
    </div>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <div class="form-actions">
      <button type="submit" [disabled]="staffForm.invalid">Save</button>
      <button type="button" class="cancel" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
